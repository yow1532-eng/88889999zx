<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }

  nav { border-bottom: 1px solid #efefef; padding: 16px 0; text-align: center; position: sticky; top: 0; background: #fff; z-index: 100; }
  nav h1 { font-size: 1rem; font-weight: 600; letter-spacing: 1px; }
  nav .back-btn { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 2rem; cursor: pointer; color: #111; display: none; font-weight: 300; }
  nav .add-btn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: #111; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; }

  .page { display: none; }
  .page.active { display: block; }

  /* GRID */
  .grid-wrap { max-width: 935px; margin: 0 auto; padding: 20px 12px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
  .grid-item { aspect-ratio: 1; overflow: hidden; cursor: pointer; position: relative; background: #f5f5f5; }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s; }
  .grid-item:hover img { transform: scale(1.03); }
  .multi-icon { position: absolute; top: 8px; right: 8px; color: #fff; font-size: 1rem; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
  .delete-btn { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 4px; padding: 4px 8px; font-size: 0.75rem; cursor: pointer; display: none; }
  .grid-item:hover .delete-btn { display: block; }
  .empty-msg { text-align: center; color: #aaa; font-size: 0.9rem; margin-top: 60px; grid-column: 1/-1; }

  /* DETAIL - 스크롤 뷰 */
  .detail-wrap { max-width: 700px; margin: 0 auto; padding: 16px 12px 40px; }
  .detail-images { display: flex; flex-direction: column; gap: 4px; }
  .detail-images img { width: 100%; height: auto; display: block; border-radius: 2px; cursor: zoom-in; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500; flex-direction: column; justify-content: center; align-items: center; }
  .lightbox.open { display: flex; }
  .lightbox-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 16px; }
  .lightbox-img-wrap img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 4px; transition: transform 0.1s; transform-origin: center center; cursor: grab; }
  .lightbox-img-wrap img.grabbing { cursor: grabbing; }
  .lightbox-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; z-index: 10; }
  .lightbox-counter { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 0.9rem; font-weight: 600; }
  .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 2rem; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .lightbox-arrow.prev { left: 16px; }
  .lightbox-arrow.next { right: 16px; }
  .lightbox-thumbs { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; width: 100%; justify-content: center; }
  .lightbox-thumbs img { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; cursor: pointer; opacity: 0.5; flex-shrink: 0; border: 2px solid transparent; }
  .lightbox-thumbs img.active { opacity: 1; border-color: #fff; }

  /* MODAL */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal.open { display: flex; }
  .modal-box { background: #fff; border-radius: 10px; padding: 28px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-box h2 { font-size: 1rem; margin-bottom: 20px; font-weight: 600; }
  .file-drop { border: 2px dashed #ddd; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; margin-bottom: 16px; }
  .file-drop input { display: none; }
  .file-drop p { font-size: 0.85rem; color: #aaa; }
  .preview-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .pt { position: relative; width: 70px; height: 70px; }
  .pt img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 2px solid transparent; cursor: pointer; }
  .pt img.selected-thumb { border-color: #111; }
  .pt .star { position: absolute; top: 2px; left: 2px; font-size: 0.7rem; background: #111; color: #fff; border-radius: 3px; padding: 1px 4px; display: none; }
  .pt img.selected-thumb ~ .star { display: block; }
  .thumb-hint { font-size: 0.78rem; color: #aaa; margin-bottom: 10px; }
  .crop-hint { font-size: 0.78rem; color: #888; margin-bottom: 10px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .modal-actions button { padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; }
  .btn-cancel { background: #f0f0f0; color: #555; }
  .btn-save { background: #111; color: #fff; }
  .btn-crop { background: #f0f0f0; color: #111; font-size: 0.8rem; padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer; margin-top: 4px; display: none; }
  .uploading { text-align: center; color: #888; font-size: 0.85rem; margin-top: 8px; }

  /* CROP MODAL */
  .crop-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .crop-modal.open { display: flex; }
  .crop-container { position: relative; display: inline-block; cursor: crosshair; user-select: none; }
  .crop-container img { display: block; max-width: 90vw; max-height: 70vh; }
  .crop-selection { position: absolute; border: 2px solid #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); pointer-events: none; }
  .crop-actions { display: flex; gap: 12px; }
  .crop-actions button { padding: 10px 24px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
  .btn-crop-cancel { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-crop-apply { background: #fff; color: #111; font-weight: 600; }

  /* DELETE CONFIRM */
  .confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; align-items: center; justify-content: center; }
  .confirm-modal.open { display: flex; }
  .confirm-box { background: #fff; border-radius: 10px; padding: 28px; width: 90%; max-width: 320px; text-align: center; }
  .confirm-box p { font-size: 0.95rem; margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; justify-content: center; }
  .btn-confirm-cancel { background: #f0f0f0; color: #555; padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; }
  .btn-confirm-delete { background: #e33; color: #fff; padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; }
</style>
</head>
<body>

<nav>
  <button class="back-btn" id="backBtn">‹</button>
  <h1 id="navTitle">GALLERY</h1>
  <button class="add-btn" id="openModal">+ 추가</button>
</nav>

<div class="page active" id="gridPage">
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="page" id="detailPage">
  <div class="detail-wrap">
    <div class="detail-images" id="detailImages"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-counter" id="lightboxCounter"></span>
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <div class="lightbox-img-wrap">
    <button class="lightbox-arrow prev" id="lightboxPrev">‹</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-arrow next" id="lightboxNext">›</button>
  </div>
  <div class="lightbox-thumbs" id="lightboxThumbs"></div>
</div>

<!-- ADD POST MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2>새 게시글</h2>
    <div class="file-drop" id="fileDrop">
      <input type="file" id="fileInput" accept="image/*" multiple>
      <p>클릭하거나 사진을 드래그하세요</p>
    </div>
    <p class="thumb-hint">👆 대표 썸네일로 쓸 사진을 클릭해 선택하세요</p>
    <div class="preview-thumbs" id="previewThumbs"></div>
    <div style="text-align:right; margin-bottom:8px;">
      <button class="btn-crop" id="cropBtn">✂️ 썸네일 크롭</button>
    </div>
    <p class="crop-hint" id="cropStatus"></p>
    <div class="uploading" id="uploadingMsg" style="display:none;">업로드 중...</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="closeModal">취소</button>
      <button class="btn-save" id="savePost">저장</button>
    </div>
  </div>
</div>

<!-- CROP MODAL -->
<div class="crop-modal" id="cropModal">
  <div class="crop-container" id="cropContainer">
    <img id="cropImg" src="" alt="crop">
    <div class="crop-selection" id="cropSelection" style="display:none;"></div>
  </div>
  <div class="crop-actions">
    <button class="btn-crop-cancel" id="cropCancelBtn">취소</button>
    <button class="btn-crop-apply" id="cropApplyBtn">적용</button>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-box">
    <p>이 게시글을 삭제할까요?</p>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" id="confirmCancelBtn">취소</button>
      <button class="btn-confirm-delete" id="confirmDeleteBtn">삭제</button>
    </div>
  </div>
</div>

<canvas id="cropCanvas" style="display:none;"></canvas>

<script>
  const SUPABASE_URL = 'https://xdqgrflrxjocnjkwacdw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_njD2UUT3CcW-III-r859_w_VMhuSqk5';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let posts = [];
  let currentPost = null;
  let selectedThumbIdx = 0;
  let pendingFiles = [];
  let croppedThumb = null;
  let deleteTargetId = null;
  let cropStart = null, cropEnd = null, isDragging = false;

  const gridEl = document.getElementById('grid');
  const modal = document.getElementById('modal');
  const fileInput = document.getElementById('fileInput');
  const previewThumbs = document.getElementById('previewThumbs');
  const backBtn = document.getElementById('backBtn');
  const navTitle = document.getElementById('navTitle');
  const cropBtn = document.getElementById('cropBtn');
  const cropModal = document.getElementById('cropModal');
  const cropImg = document.getElementById('cropImg');
  const cropSelection = document.getElementById('cropSelection');
  const cropContainer = document.getElementById('cropContainer');
  const cropCanvas = document.getElementById('cropCanvas');
  const cropStatus = document.getElementById('cropStatus');
  const uploadingMsg = document.getElementById('uploadingMsg');
  const confirmModal = document.getElementById('confirmModal');
  const detailImages = document.getElementById('detailImages');

  async function loadPosts() {
    const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    posts = data || [];
    renderGrid();
  }

  document.getElementById('openModal').onclick = () => { resetModal(); modal.classList.add('open'); };
  document.getElementById('closeModal').onclick = () => modal.classList.remove('open');
  document.getElementById('fileDrop').onclick = () => fileInput.click();

  const drop = document.getElementById('fileDrop');
  drop.ondragover = e => e.preventDefault();
  drop.ondrop = e => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
  fileInput.onchange = () => handleFiles(fileInput.files);

  function handleFiles(files) {
    pendingFiles = []; previewThumbs.innerHTML = '';
    selectedThumbIdx = 0; croppedThumb = null;
    cropStatus.textContent = ''; cropBtn.style.display = 'none';
    let loaded = 0;
    const total = files.length;
    const fileArr = Array.from(files);
    const dataUrls = new Array(total);
    fileArr.forEach((f, i) => {
      const reader = new FileReader();
      reader.onload = e => {
        dataUrls[i] = { url: e.target.result, file: f };
        loaded++;
        if (loaded === total) {
          dataUrls.forEach((d, idx) => { pendingFiles.push(d); renderPreviewThumb(d.url, idx); });
          cropBtn.style.display = 'inline-block';
        }
      };
      reader.readAsDataURL(f);
    });
  }

  function renderPreviewThumb(url, i) {
    const wrap = document.createElement('div'); wrap.className = 'pt';
    const img = document.createElement('img'); img.src = url;
    if (i === 0) img.classList.add('selected-thumb');
    img.onclick = () => {
      document.querySelectorAll('.preview-thumbs .pt img').forEach(el => el.classList.remove('selected-thumb'));
      img.classList.add('selected-thumb'); selectedThumbIdx = i; croppedThumb = null; cropStatus.textContent = '';
    };
    const star = document.createElement('span'); star.className = 'star'; star.textContent = '대표';
    wrap.appendChild(img); wrap.appendChild(star); previewThumbs.appendChild(wrap);
  }

  cropBtn.onclick = () => {
    if (!pendingFiles.length) return;
    cropImg.src = pendingFiles[selectedThumbIdx].url;
    cropSelection.style.display = 'none'; cropStart = null; cropEnd = null;
    cropModal.classList.add('open');
  };
  document.getElementById('cropCancelBtn').onclick = () => cropModal.classList.remove('open');

  cropContainer.addEventListener('mousedown', e => {
    const r = cropImg.getBoundingClientRect();
    cropStart = { x: e.clientX - r.left, y: e.clientY - r.top }; cropEnd = { ...cropStart }; isDragging = true; updateCropSelection(); e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const r = cropImg.getBoundingClientRect();
    cropEnd = { x: Math.max(0, Math.min(e.clientX - r.left, cropImg.offsetWidth)), y: Math.max(0, Math.min(e.clientY - r.top, cropImg.offsetHeight)) };
    updateCropSelection();
  });
  window.addEventListener('mouseup', () => { isDragging = false; });
  cropContainer.addEventListener('touchstart', e => {
    const t = e.touches[0], r = cropImg.getBoundingClientRect();
    cropStart = { x: t.clientX - r.left, y: t.clientY - r.top }; cropEnd = { ...cropStart }; isDragging = true; updateCropSelection(); e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const t = e.touches[0], r = cropImg.getBoundingClientRect();
    cropEnd = { x: Math.max(0, Math.min(t.clientX - r.left, cropImg.offsetWidth)), y: Math.max(0, Math.min(t.clientY - r.top, cropImg.offsetHeight)) };
    updateCropSelection();
  }, { passive: false });
  window.addEventListener('touchend', () => { isDragging = false; });

  function updateCropSelection() {
    if (!cropStart || !cropEnd) return;
    const x = Math.min(cropStart.x, cropEnd.x), y = Math.min(cropStart.y, cropEnd.y);
    const w = Math.abs(cropEnd.x - cropStart.x), h = Math.abs(cropEnd.y - cropStart.y);
    cropSelection.style.display = w > 2 && h > 2 ? 'block' : 'none';
    Object.assign(cropSelection.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
  }

  document.getElementById('cropApplyBtn').onclick = () => {
    if (!cropStart || !cropEnd) { cropModal.classList.remove('open'); return; }
    const x = Math.min(cropStart.x, cropEnd.x), y = Math.min(cropStart.y, cropEnd.y);
    const w = Math.abs(cropEnd.x - cropStart.x), h = Math.abs(cropEnd.y - cropStart.y);
    if (w < 4 || h < 4) { cropModal.classList.remove('open'); return; }
    const scaleX = cropImg.naturalWidth / cropImg.offsetWidth, scaleY = cropImg.naturalHeight / cropImg.offsetHeight;
    cropCanvas.width = w * scaleX; cropCanvas.height = h * scaleY;
    const ctx = cropCanvas.getContext('2d');
    const src = new Image();
    src.onload = () => {
      ctx.drawImage(src, x*scaleX, y*scaleY, w*scaleX, h*scaleY, 0, 0, cropCanvas.width, cropCanvas.height);
      croppedThumb = cropCanvas.toDataURL('image/jpeg', 0.92);
      const thumbImgs = document.querySelectorAll('.preview-thumbs .pt img');
      if (thumbImgs[selectedThumbIdx]) thumbImgs[selectedThumbIdx].src = croppedThumb;
      cropStatus.textContent = '✅ 크롭이 적용됐어요!'; cropModal.classList.remove('open');
    };
    src.src = pendingFiles[selectedThumbIdx].url;
  };

  document.getElementById('savePost').onclick = async () => {
    if (!pendingFiles.length) return alert('사진을 선택해주세요.');
    uploadingMsg.style.display = 'block';
    document.getElementById('savePost').disabled = true;
    try {
      const postId = Date.now().toString();
      const imageUrls = [];
      for (let i = 0; i < pendingFiles.length; i++) {
        const f = pendingFiles[i].file;
        const ext = f.name.split('.').pop();
        const path = `${postId}/${i}.${ext}`;
        const { error } = await sb.storage.from('gallery').upload(path, f);
        if (error) throw error;
        const { data } = sb.storage.from('gallery').getPublicUrl(path);
        imageUrls.push(data.publicUrl);
      }
      let thumbUrl = imageUrls[selectedThumbIdx];
      if (croppedThumb) {
        const blob = await (await fetch(croppedThumb)).blob();
        const thumbPath = `${postId}/thumb.jpg`;
        const { error } = await sb.storage.from('gallery').upload(thumbPath, blob);
        if (error) throw error;
        const { data } = sb.storage.from('gallery').getPublicUrl(thumbPath);
        thumbUrl = data.publicUrl;
      }
      const { error: dbErr } = await sb.from('posts').insert({ id: postId, thumb: thumbUrl, images: imageUrls });
      if (dbErr) throw dbErr;
      modal.classList.remove('open');
      await loadPosts();
    } catch (e) {
      alert('오류가 발생했어요: ' + e.message);
    } finally {
      uploadingMsg.style.display = 'none';
      document.getElementById('savePost').disabled = false;
    }
  };

  function resetModal() {
    pendingFiles = []; selectedThumbIdx = 0; croppedThumb = null;
    previewThumbs.innerHTML = ''; fileInput.value = '';
    cropStatus.textContent = ''; cropBtn.style.display = 'none';
  }

  document.getElementById('confirmCancelBtn').onclick = () => confirmModal.classList.remove('open');
  document.getElementById('confirmDeleteBtn').onclick = async () => {
    confirmModal.classList.remove('open');
    if (!deleteTargetId) return;
    const post = posts.find(p => p.id === deleteTargetId);
    if (!post) return;
    const paths = post.images.map(url => url.split('/gallery/')[1]);
    if (post.thumb.includes('/thumb.jpg')) paths.push(`${post.id}/thumb.jpg`);
    await sb.storage.from('gallery').remove(paths);
    await sb.from('posts').delete().eq('id', deleteTargetId);
    deleteTargetId = null;
    await loadPosts();
  };

  function renderGrid() {
    gridEl.innerHTML = '';
    if (!posts.length) {
      gridEl.innerHTML = '<p class="empty-msg">아직 게시글이 없어요.<br>+ 추가 버튼을 눌러 추가해보세요!</p>';
      return;
    }
    posts.forEach(post => {
      const item = document.createElement('div'); item.className = 'grid-item';
      const img = document.createElement('img'); img.src = post.thumb;
      item.appendChild(img);
      if (post.images.length > 1) {
        const icon = document.createElement('span'); icon.className = 'multi-icon'; icon.textContent = '⧉'; item.appendChild(icon);
      }
      const delBtn = document.createElement('button'); delBtn.className = 'delete-btn'; delBtn.textContent = '🗑️ 삭제';
      delBtn.onclick = e => { e.stopPropagation(); deleteTargetId = post.id; confirmModal.classList.add('open'); };
      item.appendChild(delBtn);
      item.onclick = () => openDetail(post);
      gridEl.appendChild(item);
    });
  }

  // Lightbox zoom & pan
  let scale = 1, panX = 0, panY = 0;
  let isPanning = false, panStartX = 0, panStartY = 0;
  let pinchDist = 0;

  function applyTransform() {
    lightboxImg.style.transform = `scale(${scale}) translate(${panX}px, ${panY}px)`;
  }

  function resetZoom() { scale = 1; panX = 0; panY = 0; applyTransform(); }

  // 마우스 휠 줌
  lightboxImg.addEventListener('wheel', e => {
    e.preventDefault();
    scale = Math.min(5, Math.max(1, scale - e.deltaY * 0.002));
    if (scale === 1) { panX = 0; panY = 0; }
    applyTransform();
  }, { passive: false });

  // 마우스 드래그 패닝
  lightboxImg.addEventListener('mousedown', e => {
    if (scale === 1) return;
    isPanning = true; panStartX = e.clientX - panX * scale; panStartY = e.clientY - panY * scale;
    lightboxImg.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    panX = (e.clientX - panStartX) / scale; panY = (e.clientY - panStartY) / scale;
    applyTransform();
  });
  window.addEventListener('mouseup', () => { isPanning = false; lightboxImg.classList.remove('grabbing'); });

  // 핀치 줌 (모바일)
  lightboxImg.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    } else if (e.touches.length === 1 && scale > 1) {
      isPanning = true; panStartX = e.touches[0].clientX - panX * scale; panStartY = e.touches[0].clientY - panY * scale;
    }
  }, { passive: true });
  lightboxImg.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      scale = Math.min(5, Math.max(1, scale * (dist / pinchDist)));
      pinchDist = dist;
      if (scale === 1) { panX = 0; panY = 0; }
      applyTransform();
    } else if (e.touches.length === 1 && isPanning) {
      panX = (e.touches[0].clientX - panStartX) / scale; panY = (e.touches[0].clientY - panStartY) / scale;
      applyTransform();
    }
  }, { passive: false });
  lightboxImg.addEventListener('touchend', () => { isPanning = false; });

  // Lightbox
  let lbImages = [], lbIdx = 0;
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxThumbs = document.getElementById('lightboxThumbs');
  const lightboxCounter = document.getElementById('lightboxCounter');

  function openLightbox(images, idx) {
    lbImages = images; lbIdx = idx;
    lightboxThumbs.innerHTML = '';
    images.forEach((src, i) => {
      const th = document.createElement('img');
      th.src = src;
      th.onclick = () => goLightbox(i);
      lightboxThumbs.appendChild(th);
    });
    updateLightbox();
    lightbox.classList.add('open');
  }

  function updateLightbox() {
    lightboxImg.src = lbImages[lbIdx];
    lightboxCounter.textContent = `${lbIdx + 1} / ${lbImages.length}`;
    lightboxThumbs.querySelectorAll('img').forEach((el, i) => el.classList.toggle('active', i === lbIdx));
    resetZoom();
  }

  function goLightbox(idx) {
    lbIdx = (idx + lbImages.length) % lbImages.length;
    updateLightbox();
  }

  document.getElementById('lightboxClose').onclick = () => lightbox.classList.remove('open');
  document.getElementById('lightboxPrev').onclick = () => goLightbox(lbIdx - 1);
  document.getElementById('lightboxNext').onclick = () => goLightbox(lbIdx + 1);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft') goLightbox(lbIdx - 1);
    if (e.key === 'ArrowRight') goLightbox(lbIdx + 1);
    if (e.key === 'Escape') lightbox.classList.remove('open');
  });

  function openDetail(post) {
    currentPost = post;
    detailImages.innerHTML = '';
    post.images.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.onclick = () => openLightbox(post.images, i);
      detailImages.appendChild(img);
    });
    document.getElementById('gridPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    backBtn.style.display = 'block';
    document.getElementById('openModal').style.display = 'none';
    navTitle.textContent = '';
    window.scrollTo(0, 0);
  }

  backBtn.onclick = () => {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('gridPage').classList.add('active');
    backBtn.style.display = 'none';
    document.getElementById('openModal').style.display = 'block';
    navTitle.textContent = 'GALLERY';
  };

  loadPosts();
</script>
</body>
</html>
